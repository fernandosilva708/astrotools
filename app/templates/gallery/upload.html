{% extends 'base.html' %}
{% block title %}Upload Image — AstroTools{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4"><i class="bi bi-upload"></i> Upload Image</h2>
    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Image File</label>
            <input type="file" name="image" class="form-control"
                   accept=".jpg,.jpeg,.png,.tif,.tiff,.fits,.fit" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Title <span class="text-muted">(optional)</span></label>
            <input type="text" name="title" class="form-control" placeholder="Leave blank to use filename">
          </div>
          <div class="mb-3">
            <label class="form-label">Description <span class="text-muted">(optional)</span></label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Upload</button>
            <a href="{{ url_for('gallery.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
