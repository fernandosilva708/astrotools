{% extends 'base.html' %}
{% block title %}Carregar Imagem — AstroTools{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4"><i class="bi bi-upload"></i> <span data-i18n="gallery_upload">Carregar Imagem</span></h2>
    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label" data-i18n="gallery_image_file">Ficheiro de Imagem</label>
            <input type="file" name="image" class="form-control"
                   accept=".jpg,.jpeg,.png,.tif,.tiff,.fits,.fit" required>
          </div>
          <div class="mb-3">
            <label class="form-label">
              <span data-i18n="gallery_title">Título</span>
              <span class="text-muted" data-i18n="optional">(opcional)</span>
            </label>
            <input type="text" name="title" class="form-control"
                   data-i18n-placeholder="gallery_title_placeholder"
                   placeholder="Deixe em branco para usar o nome do ficheiro">
          </div>
          <div class="mb-3">
            <label class="form-label">
              <span data-i18n="gallery_description">Descrição</span>
              <span class="text-muted" data-i18n="optional">(opcional)</span>
            </label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" data-i18n="gallery_upload_short">Carregar</button>
            <a href="{{ url_for('gallery.index') }}" class="btn btn-outline-secondary" data-i18n="cancel">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
