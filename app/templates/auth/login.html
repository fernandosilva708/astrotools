{% extends 'base.html' %}
{% block title %}Entrar — AstroTools{% endblock %}

{% block content %}
<header class="main">
    <h1>Iniciar Sessão</h1>
</header>

<section>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
            <div class="col-6">
                <label data-i18n="auth_username">Nome de utilizador</label>
                <input type="text" name="username" required autofocus data-i18n-placeholder="auth_username">
            </div>
            <div class="col-6">
                <label data-i18n="auth_password">Palavra-passe</label>
                <input type="password" name="password" required data-i18n-placeholder="auth_password">
            </div>
        </div>
        <div class="row" style="margin-top: 1em;">
            <div class="col-6">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember" data-i18n="auth_remember">Lembrar-me</label>
            </div>
        </div>
        <ul class="actions" style="margin-top: 2em;">
            <li><button type="submit" class="button primary" data-i18n="auth_login">Iniciar Sessão</button></li>
        </ul>
    </form>
    <hr>
    <p>
        <span data-i18n="auth_no_account">Sem conta?</span>
        <a href="{{ url_for('auth.register') }}" data-i18n="auth_register">Registar</a>
    </p>
</section>
{% endblock %}
