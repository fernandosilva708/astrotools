<!DOCTYPE HTML>
<html lang="pt">
<head>
    <title>AstroTools — Login</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f5f5f5; }
        .login-box { width: 100%; max-width: 400px; padding: 2em; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Entrar no AstroTools</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}" style="color: red; margin-bottom: 1em;">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="username" placeholder="Utilizador" required autofocus style="margin-bottom: 1em;">
            <input type="password" name="password" placeholder="Password" required style="margin-bottom: 1em;">
            <button type="submit" class="button primary" style="width: 100%;">Entrar</button>
        </form>
        <p style="margin-top: 1em;"><a href="{{ url_for('auth.register') }}">Criar nova conta</a></p>
    </div>
</body>
</html>
