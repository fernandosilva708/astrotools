{% extends 'base.html' %}
{% block title %}Efemérides — AstroTools{% endblock %}

{% block content %}
<header class="main">
    <h1>Efemérides</h1>
    <ul class="actions">
        <li>
            <button class="button icon fa-solid fa-cloud-download" onclick="updateEphemeris()">
                <span data-i18n="eph_update_bsp">Atualizar Dados (.bsp)</span>
            </button>
        </li>
    </ul>
</header>

<div class="row">
    <section class="col-6">
        <header class="major">
            <h2 data-i18n="eph_search">Pesquisa de Objeto</h2>
        </header>
        <form id="ephemerisForm">
            <div class="row">
                <div class="col-6">
                    <label data-i18n="eph_target">Objeto Alvo</label>
                    <input type="text" id="target" placeholder="e.g. Mars, M42" required>
                </div>
            </div>
            <div class="row" style="margin-top: 1em;">
                <div class="col-6">
                    <label data-i18n="eph_lat">Latitude</label>
                    <input type="number" id="lat" step="0.0001" placeholder="38.7169">
                </div>
                <div class="col-6">
                    <label data-i18n="eph_lon">Longitude</label>
                    <input type="number" id="lon" step="0.0001" placeholder="-9.1395">
                </div>
            </div>
            <div class="row" style="margin-top: 1em;">
                <div class="col-6">
                    <label data-i18n="eph_elevation">Altitude (m)</label>
                    <input type="number" id="elevation" value="0">
                </div>
                <div class="col-6">
                    <label data-i18n="eph_date">Data</label>
                    <input type="date" id="date">
                </div>
            </div>
            <ul class="actions" style="margin-top: 2em;">
                <li><button type="submit" class="button primary" data-i18n="eph_calculate">Calcular</button></li>
            </ul>
        </form>
    </section>
    <section class="col-6">
        <header class="major">
            <h2 data-i18n="eph_results">Resultados</h2>
        </header>
        <div id="results">
            <p data-i18n="eph_hint">Introduza um objeto e localização para calcular as efemérides.</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('date').valueAsDate = new Date();

async function updateEphemeris() {
    const btn = event.target;
    btn.disabled = true;
    try {
        const res = await fetch('{{ url_for("ephemeris.update_ephemeris") }}', { method: 'POST' });
        const data = await res.json();
        alert(data.message);
    } catch (e) {
        alert('Erro ao atualizar efemérides.');
    } finally {
        btn.disabled = false;
    }
}

document.getElementById('ephemerisForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    target: document.getElementById('target').value,
    lat: parseFloat(document.getElementById('lat').value) || 0,
    lon: parseFloat(document.getElementById('lon').value) || 0,
    elevation: parseFloat(document.getElementById('elevation').value) || 0,
    date: document.getElementById('date').value,
  };
  const res = await fetch('{{ url_for("ephemeris.calculate") }}', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  document.getElementById('results').innerHTML = `<pre><code>${JSON.stringify(data, null, 2)}</code></pre>`;
});
</script>
{% endblock %}
